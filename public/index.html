<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>德州扑克计分器</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Home Page -->
  <div id="page-home" class="page active">
    <div class="home-container">
      <div class="logo">
        <div class="logo-icon">♠♥</div>
        <h1>德州扑克计分器</h1>
        <p class="subtitle">Texas Hold'em Tracker</p>
      </div>

      <div class="home-tabs">
        <button class="tab-btn active" onclick="switchTab('create')">创建房间</button>
        <button class="tab-btn" onclick="switchTab('join')">加入房间</button>
      </div>

      <div id="tab-create" class="tab-content active">
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="createName" placeholder="输入你的昵称" maxlength="8" autocomplete="off">
        </div>
        <div class="form-group">
          <label>初始筹码</label>
          <input type="number" id="initialChips" value="1000" inputmode="numeric">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>小盲</label>
            <input type="number" id="smallBlind" value="5" inputmode="numeric">
          </div>
          <div class="form-group">
            <label>大盲</label>
            <input type="number" id="bigBlind" value="10" inputmode="numeric">
          </div>
        </div>
        <button class="btn btn-primary btn-large" onclick="app.createRoom()">创建房间</button>
      </div>

      <div id="tab-join" class="tab-content">
        <div class="form-group">
          <label>房间号</label>
          <input type="text" id="joinRoomId" placeholder="输入6位房间号" maxlength="6" autocomplete="off" style="text-transform:uppercase;">
        </div>
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="joinName" placeholder="输入你的昵称" maxlength="8" autocomplete="off">
        </div>
        <button class="btn btn-primary btn-large" onclick="app.joinRoom()">加入房间</button>
      </div>
    </div>
  </div>

  <!-- Lobby Page -->
  <div id="page-lobby" class="page"></div>

  <!-- Game Page -->
  <div id="page-game" class="page"></div>

  <!-- Settlement Page -->
  <div id="page-settlement" class="page"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/voice.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
    }
  </script>
</body>
</html>
